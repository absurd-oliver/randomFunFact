<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEMP</title>
    
</head>
<body style="white-space: pre-line">
    <input type="text"> <button>search</button>

    <span></span>
    <script defer>
        // API endpoint: https://api.dictionaryapi.dev/api/v2/entries/en/<word>

const input = document.querySelector('input');
const button = document.querySelector('button');
const span = document.querySelector('span');

async function dictionary(word) {
  try {
    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    const data = await response.json();
    process(data);
  } catch (error) {
    console.error('Error fetching fact:', error);
  }
}


function process(data){
  span.innerHTML = template(data);
}

function template(apiResponse) {
    const data = apiResponse[0];
    let output = `Word: ${data.word}\n`;
    output += `Phonetic: <i>${data.phonetic || 'N/A'}</i>\n\n`;

    let i = 0;
    data.meanings.forEach((meaning) => {
        i++
        output += `<b>${meaning.partOfSpeech.toUpperCase()}</b>\n<ol>`;
        
        meaning.definitions.forEach((def, index) => {
            output += `<li>${def.definition}\n</li>`;
            if (def.example) {
                output += `<ul><li><u>Ex: "${def.example}"</u></li></ul>\n`;
            }
        });
        output += `</ol>\n`;
    });

    return output;
}

button.addEventListener('click', () => {
    if (!input.value) return
    if (input.value.split(' ').length > 1) return
    dictionary(input.value);
});

input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
        if (!input.value) return
        if (input.value.split(' ').length > 1) return
        dictionary(input.value);
    }
});
    </script>
</body>
</html>
